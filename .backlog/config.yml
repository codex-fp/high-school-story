project_name: "High School Story"
default_status: "To Do"
statuses: ["To Do", "In Progress", "Done"]
labels: []
definition_of_done: ["Specification or owning documentation is updated when behavior changes", "Implementation matches the accepted task scope", "Required Gradle checks pass", "Relevant visual preview or launcher scenario is verified when applicable", "Verification evidence records commands run", "Verification evidence records scenario steps", "Verification evidence records observed results", "Verification evidence records relevant logs or artifact notes", "Self-review is completed before handoff", "Final handoff references the HSS task ID and residual risks"]
date_format: yyyy-mm-dd
max_column_width: 20
default_editor: "idea"
auto_open_browser: true
default_port: 6420
remote_operations: true
auto_commit: false
filesystem_only: false
bypass_git_hooks: false
check_active_branches: true
active_branch_days: 7
task_prefix: "HSS"
